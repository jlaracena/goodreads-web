<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goodreads — Juan Luis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f4ef; }
    .navbar { background: #382110; }
    .navbar-brand, .nav-link { color: #e8d5b7 !important; }
    .nav-link.active { color: #fff !important; font-weight: 600; border-bottom: 2px solid #c8a96e; }
    th { cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { background: #e8d5b7; }
    .score-bar { height: 6px; background: #c8a96e; border-radius: 3px; }
    .table-sm td, .table-sm th { font-size: 0.88rem; }
    a.book-link { color: #382110; text-decoration: none; }
    a.book-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">📚 Mis libros</span>
      <div class="navbar-nav ms-auto flex-row gap-3">
        <a class="nav-link {% if active_tab == 'rating' %}active{% endif %}" href="{% url 'lista' %}">Por rating</a>
        <a class="nav-link {% if active_tab == 'per_page' %}active{% endif %}" href="{% url 'lista_per_page' %}">Por página</a>
        <a class="nav-link {% if active_tab == 'own_paper' %}active{% endif %}" href="{% url 'lista_own_paper' %}">Tengo físico</a>
        <a class="nav-link {% if active_tab == 'plan' %}active{% endif %}" href="{% url 'plan' %}">Plan anual</a>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
